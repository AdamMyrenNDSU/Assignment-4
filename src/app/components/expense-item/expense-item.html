<div class="card shadow-sm mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-1">{{expense().title}}</h5>
            <small class="fw-semibold" [ngClass]="getColor[expense().category]">{{expense().category}}</small>
        </div>
        <div class="text-end">
            <div class="fw-bold text-success" [class.text-danger]="expense().amount > 100"> ${{expense().amount}} </div>
            <button class="btn btn-primary btn-sm m-2">Edit</button> <!-- Myabe inplement link-->
            <button class="btn btn-danger btn-sm m-2" (click)="expenseService.deleteExpense(expense().id)">Delete </button>
        </div>
    </div>
</div>
